<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lachtan - Adéla Rypková</title>
    <style>
        /* Moderní stylizace stránky */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e0f2f1; /* Světle modro-zelené pozadí */
            color: #263238;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.6;
        }

        /* Horní lišta s odkazem */
        nav {
            width: 100%;
            background-color: #00796b;
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 8px 16px;
            border: 2px solid white;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        nav a:hover {
            background-color: white;
            color: #00796b;
        }

        /* Hlavní kontejner */
        main {
            max-width: 800px;
            background: white;
            margin: 40px 20px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #004d40;
            font-size: 2.5rem;
            margin-bottom: 20px;
            border-bottom: 3px solid #b2dfdb;
            display: inline-block;
            padding-bottom: 10px;
        }

        /* Stylizace obrázku */
        .img-container {
            margin: 20px 0;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }

        img:hover {
            transform: scale(1.05); /* Jemné zvětšení při najetí myší */
        }

        p {
            font-size: 1.2rem;
            color: #546e7a;
            margin-top: 20px;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.9rem;
            color: #90a4ae;
        }
    </style>
</head>
<body>

    <nav>
        <a href="cpp.html">📄 Moje čtvrtletní práce (New York)</a>
    </nav>

    <main>
        <h1>Lachtan</h1>

        <div class="img-container">
            <img src="https://im.tiscali.cz/press/2012/11/13/47526-tuleni-mlade-base_16x9.jpg.1200?1715977114.0" alt="Roztomilý lachtan">
        </div>

        <p>Lachtani jsou neuvěřitelně roztomilí a šikovní mořští savci. 🌊</p>
    </main>

    <footer>
        &copy; 2024 Adéla Rypková
    </footer>

</body>
</html>
